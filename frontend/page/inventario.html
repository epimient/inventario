<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory - Inventario Global</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">

        <div class="bg-dark text-white" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold text-uppercase border-bottom">
               <a href="../index.html" class="list-group-item list-group-item-action bg-transparent text-white text-decoration-none">
                   Smart Stock
                </a> 
            </div>

            <div class="list-group list-group-flush my-3">
                <a href="../index.html" class="list-group-item list-group-item-action bg-transparent text-white">
                    Productos
                </a>
                <a href="panel.html" class="list-group-item list-group-item-action bg-transparent text-white">
                    Panel
                </a>
                <a href="categoria.html" class="list-group-item list-group-item-action bg-transparent text-white">
                    Categorías
                </a>
                <a href="inventario.html" class="list-group-item list-group-item-action bg-transparent text-white active">
                    Inventario Global
                </a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">

            <nav class="navbar navbar-expand-lg navbar-light bg-white py-4 px-4 shadow-sm">
                <div class="d-flex align-items-center">
                    <h2 class="fs-2 m-0" id="section-title">Inventario Global</h2>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4" id="main-content-target">
                
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Registrar Entrada de Lote (Stock)</h5>
                    </div>
                    <div class="card-body">
                        <form id="form-inventario">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label for="select-producto" class="form-label text-muted small fw-bold">Producto</label>
                                    <select class="form-select" id="select-producto" required>
                                        <option value="">Seleccione un producto...</option>
                                        </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="codigo-lote" class="form-label text-muted small fw-bold">Código de Lote</label>
                                    <input type="text" class="form-control" id="codigo-lote" placeholder="Ej: LT-001" required>
                                </div>
                                <div class="col-md-2">
                                    <label for="cantidad-lote" class="form-label text-muted small fw-bold">Cantidad</label>
                                    <input type="number" class="form-control" id="cantidad-lote" min="1" placeholder="0" required>
                                </div>
                                <div class="col-md-3">
                                    <label for="fecha-vencimiento" class="form-label text-muted small fw-bold">Fecha de Vencimiento</label>
                                    <input type="date" class="form-control" id="fecha-vencimiento" required>
                                </div>
                            </div>
                            <div class="mt-3 text-end">
                                <button type="submit" class="btn btn-primary px-4">Guardar en Inventario</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0">Control de Lotes y Caducidad</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Producto</th>
                                        <th>Cantidad</th>
                                        <th>Lote</th>
                                        <th>Vencimiento</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-inventario">
                                    <tr>
                                        <td colspan="6" class="text-center text-muted">Cargando inventario global...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div> </div> </div> <div class="modal fade" id="actionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" id="modal-content-target"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
