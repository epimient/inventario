<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory - Control de Caducidad</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">

        <div class="bg-dark text-white" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold text-uppercase border-bottom">
                  <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-white text-decoration-none">
                   Smart Stock
                </a> 
            </div>
            
            <div class="list-group list-group-flush my-3">
                 <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-white active">
                    Productos
                </a>
                <a href="page/panel.html" class="list-group-item list-group-item-action bg-transparent text-white">
                    Panel
                </a>
                <a href="page/categoria.html" class="list-group-item list-group-item-action bg-transparent text-white">
                    Categorías
                </a>
                <a href="page/inventario.html" class="list-group-item list-group-item-action bg-transparent text-white">
                    Inventario Global
                </a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">

            <nav class="navbar navbar-expand-lg navbar-light bg-white py-4 px-4 shadow-sm">
                <div class="d-flex align-items-center">
                    <h2 class="fs-2 m-0" id="section-title">Registrar Producto</h2>
                </div>
            </nav>

            <div class="container-fluid px-4" id="main-content-target">
                <div class="row my-4">
                    <div class="col-lg-10 mx-auto">

                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-primary text-white">
                                <h4 class="mb-0">Nuevo Producto</h4>
                            </div>

                            <div class="card-body">
                                <form id="form-producto">
                                    <div class="row g-3">

                                        <div class="col-md-6">
                                            <label for="codigo-producto" class="form-label">Código del Producto</label>
                                            <input type="text" class="form-control" id="codigo-producto" placeholder="Ej: LEC001" required>
                                        </div>

                                        <div class="col-md-6">
                                            <label for="nombre-producto" class="form-label">Nombre del Producto</label>
                                            <input type="text" class="form-control" id="nombre-producto" placeholder="Ej: Leche Entera" required>
                                        </div>

                                        <div class="col-md-6">
                                            <label for="categoria-producto" class="form-label">Categoría</label>
                                            <select class="form-select" id="categoria-producto" required>
                                                <option value="" selected disabled>Seleccione una categoría</option>
                                                <option value="" >Lacteos</option>
                                                 <option value="" >Frutas</option>
                                            </select>
                                        </div>

                                        <div class="col-md-6">
                                            <label for="unidad-producto" class="form-label">Unidad de Medida</label>
                                            <select class="form-select" id="unidad-producto" required>
                                                <option value="" selected disabled>Seleccione una unidad</option>
                                                <option value="Unidad">Unidad</option>
                                                <option value="Kg">Kg</option>
                                                <option value="Gramo">Gramo</option>
                                                <option value="Litro">Litro</option>
                                                <option value="Mililitro">Mililitro</option>
                                                <option value="Caja">Caja</option>
                                                <option value="Paquete">Paquete</option>
                                                <option value="Botella">Botella</option>
                                            </select>
                                        </div>

                                        <div class="col-12">
                                            <label for="descripcion-producto" class="form-label">Descripción</label>
                                            <textarea class="form-control" id="descripcion-producto" rows="3" placeholder="Descripción opcional del producto"></textarea>
                                        </div>

                                    </div>

                                    <div class="mt-4 text-end">
                                        <button type="reset" class="btn btn-secondary">Limpiar</button>
                                        <button type="submit" class="btn btn-primary">Guardar Producto</button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-dark text-white">
                                <h5 class="mb-0">Listado de Productos</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-striped table-hover align-middle">
                                        <thead>
                                            <tr>
                                                <th>Código</th>
                                                <th>Nombre</th>
                                                <th>Categoría</th>
                                                <th>Unidad</th>
                                                <th>Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tabla-productos">
                                            </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div> 

        </div>
    </div>

    <div class="modal fade" id="actionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" id="modal-content-target"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/app.js"></script>

</body>
</html>
